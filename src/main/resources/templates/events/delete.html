<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main(~{::section})}">
<body>
<section class="container mt-4">
    <h1 class="h3 text-danger">Delete Event</h1>
    <p class="text-muted">Are you sure you want to delete this event?</p>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <label class="text-muted small fw-bold d-block text-uppercase">Name</label>
            <span class="fw-bold" th:text="${event.name}">Event Name</span>
        </div>

        <div class="col-md-4">
            <label class="text-muted small fw-bold d-block text-uppercase">Date</label>
            <span th:text="${event.date}">2024-05-20</span>
        </div>

        <div class="col-md-4">
            <label class="text-muted small fw-bold d-block text-uppercase">Type</label>
            <span th:text="${event.eventType.name}">Event Type</span>
        </div>

        <div class="col-md-4">
            <label class="text-muted small fw-bold d-block text-uppercase">Location</label>
            <span th:text="${event.location}">Event Location</span>
        </div>

        <div class="col-md-4">
            <label class="text-muted small fw-bold d-block text-uppercase">Club</label>
            <span th:text="${event.club.name}">Club Name</span>
        </div>
    </div>

    <div class="d-flex gap-2">
        <form th:action="@{/clubs/{cId}/events/{eId}(cId=${event.club.id}, eId=${event.id})}"
              th:method="delete">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>

        <a th:href="@{/clubs/{cId}(cId=${event.club.id})}"
           class="btn btn-outline-secondary">Cancel</a>
    </div>
</section>
</body>
</html>
