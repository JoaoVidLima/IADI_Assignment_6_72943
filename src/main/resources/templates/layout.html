<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="main(content)">
<head>
    <meta charset="UTF-8">
    <title>Nova Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Nova Events</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clubs}">Clubs</a>
                </li>
            </ul>

            <div class="navbar-nav ms-auto">
                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                    <span class="navbar-text text-white me-3">
                        Welcome, <strong sec:authentication="name">User</strong>
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </div>

                <div sec:authorize="!isAuthenticated()">
                    <a class="btn btn-primary btn-sm" th:href="@{/login}">Login</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="container">
    <div th:replace="${content}"></div>
</main>

<footer class="bg-dark text-white py-4 mt-auto">
    <div class="container d-flex justify-content-between align-items-center">
        <p class="text-muted mb-0">&copy; 2026 Nova Events</p>
        <p class="mb-0 text-muted">João Lima | DIAI</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
