spring.application.name=IADI_Assignment_3_72943
spring.mvc.hiddenmethod.filter.enabled=true

spring.datasource.url=jdbc:mysql://localhost:3306/novaevents
spring.datasource.username=novaevents_user
spring.datasource.password=novaevents_pass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#  Shows the SQL statements
spring.jpa.show-sql=true
# Formats them nicely instead of one long line
spring.jpa.properties.hibernate.format_sql=true
# Shows the actual values being bound to ? parameters
logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret=novaevents-secret-key-testing-32x!
